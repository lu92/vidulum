management:
  endpoints:
    web:
      exposure:
        include: "*"

spring:
  main:
    allow-bean-definition-overriding: true
  # Spring AI Configuration
  # Use AI_PROVIDER env variable to switch between providers:
  #   - anthropic (default): Claude Haiku 4.5 - $1.00/$5.00 per 1M tokens
  #   - openai: GPT-4o-mini - $0.15/$0.60 per 1M tokens (7x cheaper)
  ai:
    # Anthropic/Claude configuration
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        enabled: ${ANTHROPIC_ENABLED:true}
        options:
          model: claude-haiku-4-5-20251001
          temperature: 0.1
          max-tokens: 16384
    # OpenAI/GPT configuration
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        enabled: ${OPENAI_ENABLED:false}
        options:
          model: gpt-4o-mini
          temperature: 0.1
          max-tokens: 16384
  # Spring Boot 4.0: spring.data.mongodb -> spring.mongodb (top-level properties)
  mongodb:
    database: testDB
    host: mongodb
#    host: localhost
    port: 27017
  kafka:
    bootstrap-servers: kafka:9092
#    bootstrap-servers: 127.0.0.1:9092
    consumer:
      group-id: group-id
      auto-offset-reset: manual
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  jackson:
    # In Jackson 3 (Spring Boot 4.0), WRITE_DATES_AS_TIMESTAMPS is false by default
    # so we don't need to configure it explicitly
    use-jackson2-defaults: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000 # a day
      refresh-token:
        expiration: 604800000 # 7 days

# CashFlow HTTP client configuration (used by recurring_rules module)
cashflow:
  service:
    url: http://localhost:8080

# Bank Data Ingestion configuration
vidulum:
  cashflow-service:
    # Base URL for cashflow-service REST API
    base-url: http://localhost:8080
    # Connection timeout in milliseconds
    connect-timeout-ms: 5000
    # Read timeout in milliseconds
    read-timeout-ms: 30000
  ingestion:
    staging:
      ttl-hours: 24
    rollback:
      window-hours: 1
    processing:
      batch-size: 50
      progress-update-interval: 10

# Bank Data Adapter (AI CSV transformation)
bank-data-adapter:
  max-file-size-bytes: 5242880  # 5MB
  max-retries: 2
  enrichment:
    enabled: true            # Enable enrichment (fills merchant + bankCategory)
    batch-size: 50           # Transactions per AI call
    max-parallelism: 4       # Max concurrent AI calls (avoid rate limiting)

# Bank Data Ingestion REST client
bank-data-ingestion:
  base-url: http://localhost:8080
